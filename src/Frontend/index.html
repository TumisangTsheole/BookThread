<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookThread | Every Book is a Conversation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&family=Merriweather:ital,wght@0,300;0,400;0,700;0,900;1,400&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
        	 darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        book: {
                            main: '#FDFBF7',
                            sidebar: '#FAF8F1',
                            card: '#F5F2EA',
                            widget: '#F5F2EA',
                            dark: '#3E2C28',
                            muted: '#6D5D55',
                            accent: '#5D4037',
                            border: '#EBE5D9'
                        }
                    },
                    fontFamily: {
                        sans: ['Lato', 'sans-serif'],
                        serif: ['Merriweather', 'serif'],
                        display: ['Playfair Display', 'serif']
                    },
                    animation: {
                        'fade-in-up': 'fadeSlideUp 0.6s ease-out backwards',
                        'shimmer': 'shimmer 1.5s infinite linear',
                    },
                    keyframes: {
                        fadeSlideUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        shimmer: {
                            '100%': { backgroundPosition: '-200%' }
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @layer utilities {
            .scrollbar-hide::-webkit-scrollbar { display: none; }
            .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
            .bg-shimmer {
                background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
                background-size: 200% 100%;
            }
        }
    </style>
    <script type="importmap">
    {
      "imports": {
        "@google/genai": "https://esm.sh/@google/genai@^1.41.0",
        "lucide-react": "https://esm.sh/lucide-react@^0.564.0",
        "react": "https://esm.sh/react@^19.2.4",
        "react-dom": "https://esm.sh/react-dom@^19.2.4",
        "react-dom/client": "https://esm.sh/react-dom@^19.2.4/client",
        "react/": "https://esm.sh/react@^19.2.4/",
        "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
        "axios": "https://esm.sh/axios@^1.6.7"
      }
    }
    </script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="bg-book-main text-book-dark overflow-hidden h-screen font-sans">
    <div id="root"></div>
    <script type="module" src="index.tsx"></script>
<script type="module" src="/index.tsx"></script>
</body>
</html>
